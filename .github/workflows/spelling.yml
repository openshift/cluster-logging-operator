name: Spell checking

on:
  pull_request_target:
    branches:
      - "**"
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  spelling:
    name: Spell checking
    permissions:
      contents: read
      pull-requests: read
      actions: read
      security-events: write
    runs-on: ubuntu-latest
    if: "contains(github.event_name, 'pull_request') || github.event_name == 'push'"
    concurrency:
      group: spelling-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: check-spelling
        id: spelling
        uses: check-spelling/check-spelling@cfb6f7e75bbfc89c71eaa30366d0c166f1bd9c8c # v0.0.26
        with:
          config: .github/actions/spelling
          check_file_names: 1
          only_check_changed_files: 1
          suppress_push_for_open_pull_request: ${{ github.actor != 'dependabot[bot]' && 1 }}
          checkout: true
          post_comment: 0
          use_sarif: ${{ (!github.event.pull_request || (github.event.pull_request.head.repo.full_name == github.repository)) && 1 }}
          extra_dictionaries: |
            cspell:k8s/dict/k8s.txt
            cspell:golang/dict/go.txt
            cspell:docker/src/docker-words.txt
            cspell:shell/dict/shell-all-words.txt
            cspell:html/dict/html.txt
            cspell:filetypes/dict/filetypes.txt
            cspell:software-terms/dict/softwareTerms.txt
          check_extra_dictionaries: ""
