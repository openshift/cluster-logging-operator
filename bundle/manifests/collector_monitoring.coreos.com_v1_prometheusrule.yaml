apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: collector
spec:
  groups:
  - name: logging_collector.alerts
    rules:
    - alert: ClusterLogForwarderDeprecations
      annotations:
        message: The Cluster Logging Operator version {{$labels.version}} includes
          deprecations to some feature of ClusterLogForwarder.
        summary: |-
          The Cluster Logging Operator version {{$labels.version}} includes deprecations to some features of ClusterLogForwarder which
          will be removed in a future release.  Please see the release notes for details:
          https://docs.redhat.com/en/documentation/red_hat_openshift_logging/6.2/html/release_notes
      expr: |
        max by (version) (csv_succeeded{exported_namespace="openshift-logging", name=~"cluster-logging.*", version=~"6.2.*"})  > 0
      for: 1m
      labels:
        namespace: openshift-logging
        service: collector
        severity: info
    - alert: ClusterLogForwarderAzureMonitorLogsDeprecation
      annotations:
        message: A ClusterLogForwarder, {{ $labels.resource_namespace }}/{{ $labels.resource_name
          }}, is configured to forward logs to Azure Monitor using the deprecated
          HTTP Data Collector API.
        summary: "The Azure Monitor HTTP Data Collector API used by the azureMonitor
          output type will be retired on September 14, 2026.\nAfter this date, log
          forwarding to Azure Monitor using this output type will no longer be possible.\nAdministrators
          must migrate to the Azure Monitor Logs Ingestion output that is supported
          by Logging version 6.6 or \ncontact Red Hat customer support for alternative
          options.\nSee the Red Hat OpenShift Logging 6.6 documentation: https://docs.redhat.com/en/documentation/red_hat_openshift_logging/6.6\nSee
          the Microsoft migration guide: https://learn.microsoft.com/en-us/azure/azure-monitor/logs/custom-logs-migrate\nSee
          the Microsoft Logs Ingestion API documentation: https://learn.microsoft.com/en-us/azure/azure-monitor/logs/logs-ingestion-api-overview"
      expr: |
        sum by(resource_namespace, resource_name) (log_forwarder_output_type{output="azureMonitor"}) > 0
      for: 1m
      labels:
        service: clusterlogforwarder
        severity: warning
    - alert: CollectorNodeDown
      annotations:
        description: Prometheus could not scrape {{ $labels.namespace }}/{{ $labels.pod
          }} collector component for more than 10m.
        summary: Collector cannot be scraped
      expr: |
        up{app_kubernetes_io_component = "collector", app_kubernetes_io_part_of = "cluster-logging"} == 0
      for: 10m
      labels:
        service: collector
        severity: critical
    - alert: DiskBufferUsage
      annotations:
        description: 'Collectors potentially consuming too much node disk, {{ $value
          }}% '
        summary: Detected consuming too much node disk on $labels.hostname host
      expr: "(label_replace(sum by(hostname) (vector_buffer_byte_size{component_kind='sink',
        buffer_type='disk'}), 'instance', '$1', 'hostname', '(.*)') \n/ on(instance)
        group_left() sum by(instance) (node_filesystem_size_bytes{mountpoint='/var'}))
        * 100  > 15\n"
      for: 5m
      labels:
        service: collector
        severity: Warning
  - name: logging_clusterlogging_telemetry.rules
    rules:
    - expr: |
        sum by(cluster)(log_logged_bytes_total)
      record: cluster:log_logged_bytes_total:sum
    - expr: |
        sum by(pod, namespace, app_kubernetes_io_instance)(rate(vector_component_errors_total[2m]))
      record: collector:log_num_errors:sum_rate
    - expr: |
        sum by(pod, namespace, app_kubernetes_io_instance)(rate(vector_component_received_events_total[2m]))
      record: collector:received_events:sum_rate
