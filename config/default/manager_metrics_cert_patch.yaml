# This patch configures the operator to use TLS certificates for the metrics endpoint.
# The certificates are automatically generated by OpenShift's service-ca controller
# based on the service.beta.openshift.io/serving-cert-secret-name annotation on the Service.
# To enable:
# 1. Uncomment this patch in config/default/kustomization.yaml
# 2. Run 'make bundle' to regenerate the bundle

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-logging-operator
spec:
  template:
    spec:
      containers:
      - name: cluster-logging-operator
        args:
        - --metrics-secure=true
        - --metrics-bind-address=:8686
        - --metrics-cert-path=/var/run/secrets/metrics-certs
        - --metrics-cert-name=tls.crt
        - --metrics-cert-key=tls.key
        volumeMounts:
        - name: metrics-certs
          mountPath: /var/run/secrets/metrics-certs
          readOnly: true
      volumes:
      - name: metrics-certs
        secret:
          secretName: cluster-logging-operator-metrics-certs
          optional: true
