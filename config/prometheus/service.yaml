apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: cluster-logging-operator-metrics-certs
  labels:
    name: cluster-logging-operator
  name: cluster-logging-operator-metrics
spec:
  ports:
    - name: https-metrics
      port: 8443
      protocol: TCP
      targetPort: 8443
  selector:
    name: cluster-logging-operator
  sessionAffinity: None
  type: ClusterIP