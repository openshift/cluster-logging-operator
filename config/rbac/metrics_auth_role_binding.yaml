metadata:
  name: cluster-logging-operator-metrics-auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-operator-metrics-auth
subjects:
  - kind: ServiceAccount
    name: cluster-logging-operator
    namespace: openshift-logging