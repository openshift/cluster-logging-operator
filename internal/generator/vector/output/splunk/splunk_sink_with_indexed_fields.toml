# Ensure timestamp field well formatted for Splunk
[transforms.splunk_hec_timestamp]
type = "remap"
inputs = ["pipelineName"]
source = '''
ts, err = parse_timestamp(.@timestamp,"%+")
if err != null {
	log("could not parse timestamp. err=" + err, rate_limit_secs: 0)
} else {
	.@timestamp = ts
}

'''

[transforms.splunk_hec_indexed_fields]
type = "remap"
inputs = ["splunk_hec_timestamp"]
source = '''
indexed_fields = [["log_source"],["kubernetes","namespace_labels","bar/baz0-9.test"],["annotations","authorization.k8s.io/decision"]]

for_each(indexed_fields) -> |_, field| {
    value = get!(., field)
    if value != null {
        new_key = replace(join!(field,"_"), r'[\./]', "_")
        if !is_string(value) {
          if is_object(value) {
            value = encode_json(value)
          } else {
            value, err = to_string(value)
          }
        }
        . =  set!(., [new_key], value)
        . = remove!(., field, true)
    }
}
'''

[sinks.splunk_hec]
type = "splunk_hec_logs"
inputs = ["splunk_hec_indexed_fields"]
endpoint = "https://splunk-web:8088/endpoint"
compression = "none"
default_token = "SECRET[kubernetes_secret.vector-splunk-secret/hecToken]"
timestamp_key = "@timestamp"
indexedFields = ["_log_source","_kubernetes_namespace_labels_bar_baz0-9_test","_annotations_authorization_k8s_io_decision"]

[sinks.splunk_hec.encoding]
codec = "json"
except_fields = ["_internal"]