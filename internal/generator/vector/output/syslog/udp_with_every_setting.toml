[transforms.example_parse_encoding]
type = "remap"
inputs = ["application"]
source = '''
._syslog.facility = "kern"
._syslog.severity = "critical"
._syslog.proc_id = "procID"
._syslog.tag = "appName"
if ._syslog.proc_id != "-" {
 ._syslog.tag = ._syslog.tag + "[" + ._syslog.proc_id + "]"
}
if is_null(.plKey) {
    .payload_key = .
} else {
    .payload_key = .plKey
}
'''

[sinks.example]
type = "socket"
inputs = ["example_parse_encoding"]
address = "logserver:514"
mode = "udp"

[sinks.example.encoding]
codec = "syslog"
except_fields = ["_internal"]
rfc = "rfc3164"
facility = "$$._syslog.facility"
severity = "$$._syslog.severity"
proc_id = "$$._syslog.proc_id"
tag = "$$._syslog.tag"
add_log_source = false
payload_key = "payload_key"

